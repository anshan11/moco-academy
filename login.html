<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MOCO - Login</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #FFFFFF;
      color: #111111;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1.6;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #F5F5F5;
    }

    ::-webkit-scrollbar-thumb {
      background: #CCCCCC;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #999999;
    }

    .login-container {
      max-width: 420px;
      width: 90%;
      padding: 48px;
      background: #FFFFFF;
      border: 1px solid #E0E0E0;
      border-radius: 16px;
      text-align: center;
      animation: fadeInUp 0.6s ease;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin-bottom: 32px;
    }

    .logo img {
      height: 80px;
      width: auto;
      margin-bottom: 16px;
    }

    .logo h1 {
      font-size: 32px;
      font-weight: 700;
      color: #111111;
      letter-spacing: 1px;
      margin: 0;
    }

    .login-container h2 {
      font-size: 18px;
      font-weight: 500;
      color: #666666;
      margin-bottom: 32px;
      letter-spacing: 0.5px;
    }

    .form-group {
      margin-bottom: 24px;
      text-align: left;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #333333;
      margin-bottom: 10px;
      letter-spacing: 0.5px;
    }

    .form-group input {
      width: 100%;
      padding: 14px 18px;
      border: 1px solid #E0E0E0;
      border-radius: 10px;
      font-size: 15px;
      color: #111111;
      background: #FFFFFF;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .form-group input:focus {
      outline: none;
      border-color: #111111;
      box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.05);
      background: #FAFAFA;
    }

    .form-group input::placeholder {
      color: #999999;
    }

    .btn {
      width: 100%;
      padding: 14px 28px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
    }

    .btn-primary {
      background: #111111;
      color: #FFFFFF;
    }

    .btn-primary:hover {
      background: #333333;
    }

    .notification {
      position: fixed;
      top: 24px;
      right: 24px;
      padding: 16px 24px;
      background: #111111;
      color: #FFFFFF;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      z-index: 1001;
      display: none;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
      animation: slideInRight 0.3s ease;
    }

    @keyframes slideInRight {
      from {
        opacity: 0;
        transform: translateX(100px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .notification.show {
      display: block;
    }

    .notification.success {
      background: #111111;
      color: #FFFFFF;
      border-left: 4px solid #4CAF50;
    }

    .notification.error {
      background: #111111;
      color: #FFFFFF;
      border-left: 4px solid #F44336;
    }

    .loading {
      display: none;
      text-align: center;
      margin-top: 20px;
    }

    .loading.show {
      display: block;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #E0E0E0;
      border-top: 3px solid #111111;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Mobile Responsive */
    @media (max-width: 480px) {
      .login-container {
        margin: 30px auto;
        padding: 32px 24px;
      }

      .logo img {
        height: 50px;
      }

      .logo h1 {
        font-size: 26px;
      }

      .login-container h2 {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">
      <img src="logo.png" alt="Moco Academy Logo">
      <h1>Moco Academy</h1>
    </div>
    <h2>Welcome Back</h2>
    <form id="loginForm">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" required placeholder="Enter your username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" required placeholder="Enter your password">
      </div>
      <button type="submit" class="btn btn-primary">
        <i class="fas fa-sign-in-alt"></i> Login
      </button>
    </form>
    <div class="loading" id="loading">
      <div class="spinner"></div>
    </div>
  </div>

  <!-- Notification -->
  <div class="notification" id="notification"></div>

  <script src="login.js"></script>
</body>
</html>
